<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Sheet Extractor</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #input { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Sprite Sheet Extractor</h1>
    <input type="file" id="input" accept="image/*">
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="sprites"></div>
    <script>
        document.getElementById('input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    const spriteWidth = 64; // Set the width of each sprite
                    const spriteHeight = 64; // Set the height of each sprite
                    const columns = Math.floor(img.width / spriteWidth);
                    const rows = Math.floor(img.height / spriteHeight);
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const spritesDiv = document.getElementById('sprites');
                    spritesDiv.innerHTML = '';

                    for (let row = 0; row < rows; row++) {
                        for (let col = 0; col < columns; col++) {
                            const spriteCanvas = document.createElement('canvas');
                            spriteCanvas.width = spriteWidth;
                            spriteCanvas.height = spriteHeight;
                            const spriteCtx = spriteCanvas.getContext('2d');
                            spriteCtx.drawImage(canvas, col * spriteWidth, row * spriteHeight, spriteWidth, spriteHeight, 0, 0, spriteWidth, spriteHeight);
                            spritesDiv.appendChild(spriteCanvas);
                        }
                    }
                };
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
